<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo azul con bordes redondeados (estilo app icon) -->
  <rect width="32" height="32" rx="8" fill="#2563EB"/>

  <!-- Waypoint izquierdo -->
  <circle cx="7" cy="8.5" r="3" fill="white"/>

  <!-- Waypoint derecho -->
  <circle cx="25" cy="8.5" r="3" fill="white"/>

  <!-- Línea izquierda hacia pin destino -->
  <line x1="7" y1="11.2" x2="16" y2="24.5"
        stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Línea derecha hacia pin destino -->
  <line x1="25" y1="11.2" x2="16" y2="24.5"
        stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Pin destino -->
  <circle cx="16" cy="26" r="2.8" fill="white"/>
</svg>
